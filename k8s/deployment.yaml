apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-deployment
  namespace: default   # 可改成你的 namespace
spec:
  replicas: 3
  selector:
    matchLabels:
      app: nginx
  template:
    metadata:
      labels:
        app: nginx
    spec:
      containers:
      - name: nginx
        image: ghcr.io/你的GitHub用户名/nginx-k8s-demo:PLACEHOLDER   # Jenkins 会替换
        ports:
        - containerPort: 80
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "200m"
            memory: "256Mi"
